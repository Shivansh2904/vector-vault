services:
  - type: web
    name: vector-vault-api
    runtime: python
    plan: standard
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: HF_HOME
        value: /opt/render/project/.huggingface
    disk:
      name: hf-cache
      mountPath: /opt/render/project/.huggingface
      sizeGB: 5
