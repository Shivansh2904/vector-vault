name: Bug Report
description: Report something that is broken or behaves unexpectedly
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend (FastAPI)
        - Frontend (React)
        - Docker / deployment
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Upload a PDF named ...
        2. Search for "..."
        3. No results returned
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
